name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src tests scripts

      - name: Ruff format
        run: python -m ruff format --check src tests scripts

      - name: Mypy
        run: python -m mypy src

      - name: Pytest + coverage
        run: python -m pytest

      - name: Build wheel and verify lucid.kaggle is packaged
        run: |
          python -m pip install build
          python -m build --wheel
          python scripts/verify_wheel_has_kaggle.py

      - name: Verify M11 probe module is in git at HEAD (Kaggle pin sanity)
        run: python scripts/verify_m11_git_has_module.py

      - name: Verify canonical Kaggle notebook matches generator (HEAD)
        run: python scripts/generate_kaggle_notebook.py --check -o notebooks/lucid_kaggle_transport_text_adapter_m_01.ipynb

      - name: Verify M04 Family 1 analytics Kaggle notebook matches generator (HEAD)
        run: python scripts/generate_family1_m04_notebook.py --check -o notebooks/lucid_kaggle_family1_m04_analytics.ipynb

      - name: Verify M09 panel artifact matches generator
        run: python scripts/generate_m09_panel_artifact.py --check

      - name: Verify M09 mature-evidence Kaggle notebook matches generator (HEAD)
        run: python scripts/generate_m09_kaggle_notebook.py --check -o notebooks/lucid_kaggle_m09_mature_evidence.ipynb

      - name: Verify Family 1 M03 canonical pack manifest
        run: python scripts/generate_family1_core_m03_manifest.py --check

      - name: Verify Family 2 M05 canonical pack manifest
        run: python scripts/generate_family2_core_m05_manifest.py --check

      - name: Verify Family 3 M06 canonical pack manifest
        run: python scripts/generate_family3_core_m06_manifest.py --check

      - name: Verify M07 unified canonical pack manifest
        run: python scripts/generate_unified_core_m07_manifest.py --check

      - name: M08 unified defensibility audit (--check)
        run: python scripts/run_unified_defensibility_audit.py --check

      - name: Verify M10 tables match generator
        run: python scripts/generate_m10_tables.py --check

      - name: Verify M10 figures match generator
        run: python scripts/generate_m10_figures.py --check

      - name: Verify M11 probe ladder + roster artifacts
        run: python scripts/generate_m11_probe_artifacts.py --check

      - name: Verify M11 probe Kaggle notebooks match generator
        run: python scripts/generate_m11_kaggle_notebooks.py --check

      - name: M11 notebook release manifest (--check)
        run: python scripts/generate_m11_notebook_release_manifest.py --check

      - name: M11 ingest + allocation table + figures (--check)
        run: |
          python scripts/ingest_m11_platform_exports.py --check
          python scripts/generate_m11_tables.py --check
          python scripts/generate_m11_figures.py --check

      - name: M12 submission linkage (--check)
        run: python scripts/generate_m12_submission_linkage.py --check
