name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src tests scripts

      - name: Ruff format
        run: python -m ruff format --check src tests scripts

      - name: Mypy
        run: python -m mypy src

      - name: Pytest + coverage
        run: python -m pytest

      - name: Build wheel and verify lucid.kaggle is packaged
        run: |
          python -m pip install build
          python -m build --wheel
          python scripts/verify_wheel_has_kaggle.py

      - name: Verify canonical Kaggle notebook matches generator (HEAD)
        run: python scripts/generate_kaggle_notebook.py --check -o notebooks/lucid_kaggle_transport_text_adapter_m_01.ipynb

      - name: Verify M04 Family 1 analytics Kaggle notebook matches generator (HEAD)
        run: python scripts/generate_family1_m04_notebook.py --check -o notebooks/lucid_kaggle_family1_m04_analytics.ipynb

      - name: Verify Family 1 M03 canonical pack manifest
        run: python scripts/generate_family1_core_m03_manifest.py --check

      - name: Verify Family 2 M05 canonical pack manifest
        run: python scripts/generate_family2_core_m05_manifest.py --check

      - name: Verify Family 3 M06 canonical pack manifest
        run: python scripts/generate_family3_core_m06_manifest.py --check

      - name: Verify M07 unified canonical pack manifest
        run: python scripts/generate_unified_core_m07_manifest.py --check
